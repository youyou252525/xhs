name: Docker Release
on:
  # 支持手动触发
  workflow_dispatch:
  # 推送到main分支自动触发
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 登录GitHub容器仓库（自动用系统自带令牌，不用你配置）
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 小写仓库名
        id: repo-name
        run: echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >>${GITHUB_OUTPUT}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.repo-name.outputs.REPO_NAME }}:latest
            ghcr.io/${{ steps.repo-name.outputs.REPO_NAME }}:${{ github.sha }}
